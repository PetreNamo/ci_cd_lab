apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: go-simple-webserver
  labels:
    app: go-simple-webserver
spec:
  replicas: 10
  strategy:
    canary:
      steps:
        - setWeight: 50
        - pause: { duration: 60s }
        - setWeight: 100
  selector:
    matchLabels:
      app: go-simple-webserver
  template:
    metadata:
      labels:
        app: go-simple-webserver
    spec:
      containers:
        - name: webserver
          image: ghcr.io/petrenamo/go-simple-webserver@sha256:0e27c5e9c8f42d23e7750fb88bb33b8b6045e8f5ceadefab2cdfcae4b92ca96e
          ports:
            - containerPort: 8080
          imagePullPolicy: Always
